services:

  postgres:

    build:
      context: ./database


    container_name: employee-postgres


    environment:

      POSTGRES_DB: employee_management

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: louay



    volumes:

      - postgres_data:/var/lib/postgresql/data



    ports:

      - "5432:5432"



    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d employee_management"
        ]

      interval: 5s

      timeout: 5s

      retries: 10




  backend:


    build:

      context: ./backend



    container_name: employee-backend



    ports:

      - "5000:5000"



    environment:


      PORT: 5000


      DB_HOST: postgres


      DB_PORT: 5432


      DB_NAME: employee_management


      DB_USER: postgres


      DB_PASSWORD: louay


      JWT_SECRET: StageEteKERNLSI




    depends_on:


      postgres:

        condition: service_healthy





volumes:


  postgres_data: