apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Pas de "namespace:" ici : c'est chaque overlay (dev/staging/prod)
# qui définit son propre namespace au moment du build.
resources:
  - 00-namespace.yaml
  - 01-postgres-secret.yaml
  - 02-backend-secret.yaml
  - 03-postgres-pvc.yaml
  - 04-postgres-init-configmap.yaml
  - 05-postgres-statefulset.yaml
  - 06-postgres-service.yaml
  - 07-backend-deployment.yaml
  - 08-backend-service.yaml
  - 09-frontend-deployment.yaml
  - 10-frontend-service.yaml
