apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: employee-staging

resources:
  - ../../base

# "staging-latest" n'existe pas sur Docker Hub (push-dockerhub ne pousse
# que ":latest" et ":<short-sha>") -> ImagePullBackOff. On repart sur
# "latest", qui existe réellement, en attendant le prochain tag réel
# poussé par la CI sur la branche staging.
images:
  - name: silou19/backend
    newTag: latest
  - name: silou19/frontend
    newTag: latest

patches:
  - path: patch-replicas.yaml
  - path: patch-nodeport.yaml
